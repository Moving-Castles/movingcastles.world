<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="%sveltekit.assets%/app.css" />

    <!--
      Brand-level, page-invariant tags only. Everything that varies per page
      (title, description, canonical, og:url/type/image, twitter:image,
      article:*, JSON-LD) is rendered by Metadata.svelte via <svelte:head>.
    -->
    <meta name="author" content="MOVING CASTLES" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph / Facebook -->
    <meta property="og:site_name" content="MOVING CASTLES" />

    <!-- Twitter / X (handles via TWITTER_USER in Metadata.svelte) -->
    <meta property="twitter:card" content="summary_large_image" />

    <!-- PWA / platform chrome -->
    <meta name="application-name" content="MOVING CASTLES" />
    <meta name="apple-mobile-web-app-title" content="MOVING CASTLES" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor" content="#000000" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
