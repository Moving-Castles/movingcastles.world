<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="%sveltekit.assets%/app.css" />

    <!--
      Brand-level, page-invariant tags only. Everything that varies per page
      (title, description, canonical, og:url/type/image, twitter:image,
      article:*, JSON-LD) is rendered by Metadata.svelte via <svelte:head>.
    -->
    <meta name="author" content="MOVING CASTLES" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph / Facebook -->
    <meta property="og:site_name" content="MOVING CASTLES" />

    <!-- Twitter / X (handles via TWITTER_USER in Metadata.svelte) -->
    <meta property="twitter:card" content="summary_large_image" />

    <!-- PWA / platform chrome -->
    <meta name="application-name" content="MOVING CASTLES" />
    <meta name="apple-mobile-web-app-title" content="MOVING CASTLES" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor" content="#000000" />

    <!--
      Apply the saved theme before first paint so there's no flash. Night is the
      default; only an explicit "day" preference overrides it. Runs during head
      parse, before <body> renders. Kept in sync with $lib/theme.svelte.ts.
    -->
    <script>
      ;(function () {
        try {
          var theme = localStorage.getItem('theme') === 'day' ? 'day' : 'night'
          document.documentElement.dataset.theme = theme
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'day' ? '#ffffff' : '#000000')
        } catch (e) {}
      })()
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!--
      Duotone filters for .content figure.content-image.duotone img (see app.css).
      feColorMatrix collapses each pixel to its Rec. 709 luminance, then
      feComponentTransfer remaps that grey ramp onto two theme tones: shadows to
      the first tableValues entry, highlights to the second. Night maps black to
      grey; day maps dark-grey to grey. Values are theme greys / 255:
      grey 140 -> 0.549, dark 30 -> 0.118. Keep in sync with the :root vars in app.css.
    -->
    <svg aria-hidden="true" focusable="false" style="position: absolute; width: 0; height: 0">
      <filter id="duotone-night" color-interpolation-filters="sRGB">
        <feColorMatrix
          type="matrix"
          values="0.2126 0.7152 0.0722 0 0
                  0.2126 0.7152 0.0722 0 0
                  0.2126 0.7152 0.0722 0 0
                  0      0      0      1 0"
        />
        <feComponentTransfer>
          <feFuncR type="table" tableValues="0 0.549" />
          <feFuncG type="table" tableValues="0 0.549" />
          <feFuncB type="table" tableValues="0 0.549" />
        </feComponentTransfer>
      </filter>
      <filter id="duotone-day" color-interpolation-filters="sRGB">
        <feColorMatrix
          type="matrix"
          values="0.2126 0.7152 0.0722 0 0
                  0.2126 0.7152 0.0722 0 0
                  0.2126 0.7152 0.0722 0 0
                  0      0      0      1 0"
        />
        <feComponentTransfer>
          <feFuncR type="table" tableValues="0.118 0.549" />
          <feFuncG type="table" tableValues="0.118 0.549" />
          <feFuncB type="table" tableValues="0.118 0.549" />
        </feComponentTransfer>
      </filter>
    </svg>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
